<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Tooth silhouette -->
    <clipPath id="tooth">
      <path d="M 28 12 C 10 12, 10 40, 15 55 C 20 75, 25 90, 35 90 C 42 90, 48 72, 50 60 C 52 72, 58 90, 65 90 C 75 90, 80 75, 85 55 C 90 40, 90 12, 72 12 C 62 12, 55 24, 50 24 C 45 24, 38 12, 28 12 Z" />
    </clipPath>
    <!-- Gap line -->
    <mask id="gap">
      <rect width="100" height="100" fill="white" />
      <path d="M 38 14 C 20 45, 55 65, 90 52" fill="none" stroke="black" stroke-width="4.5" stroke-linecap="round" />
    </mask>
  </defs>

  <!-- Complete masked group -->
  <g clip-path="url(#tooth)" mask="url(#gap)">
    <!-- Light blue covers everything first -->
    <rect width="100" height="100" fill="#0ea5e9" />
    <!-- Dark blue covers the top right portion above the line -->
    <path d="M 38 14 C 20 45, 55 65, 90 52 L 100 52 L 100 0 L 38 0 Z" fill="#1e40af" />
  </g>
</svg>
